<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - StepUp Shoes</title>
  <link rel="stylesheet" href="Registrazione.css">
</head>
<body>

<header>
  <h1>StepUp Shoes</h1>
  <p class="subtitle">Crea il tuo account</p>
</header>

<nav class="navbar">
  <div class="navbar-container">
    <ul class="navbar-menu">
      <li><a href="Homepage.html">Home</a></li>
      <li><a href="Store.html">Store</a></li>
      <li><a href="Contattaci.html">Contattaci</a></li>
      <li><a href="Login.html">Login</a></li>
    </ul>
  </div>
</nav>

<section class="register-container">
  <div class="register-box">
    <h2>Registrazione</h2>

    <form>
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Inserisci il tuo nome" required>

      <label for="cognome">Cognome</label>
      <input type="text" id="cognome" placeholder="Inserisci il tuo cognome" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Inserisci la tua email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Crea una password" required>

      <label for="conferma-password">Conferma Password</label>
      <input type="password" id="conferma-password" placeholder="Conferma la password" required>

      <button type="submit">Registrati</button>
    </form>

    <p class="login-text">
      Hai già un account? <a href="Login.html">Accedi</a>
    </p>
  </div>
</section>

</body>
</html>
