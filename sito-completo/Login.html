<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StepUp Shoes</title>
  <link rel="stylesheet" href="Login.css">
</head>
<body>

<header>
  <h1>StepUp Shoes</h1>
  <p class="headercolor">Accedi al tuo account</p>
</header>

<nav class="navbar">
  <div class="navbar-container">
    <ul class="navbar-menu">
      <li><a href="Homepage.html">Home</a></li>
      <li><a href="Store.html">Store</a></li>
      <li><a href="Contattaci.html">Contattaci</a></li>

    </ul>
  </div>

<div class="side-decor left"></div>
<div class="side-decor right"></div>

<section class="login-section">
  <div class="login-box">
    <h2>Login</h2>

    <form>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Inserisci la tua email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Inserisci la password" required>

      <button type="submit">Accedi</button>
    </form>

    <p class="bottom-text">
      Non hai un account?
      <a href="Registrazione.html">Registrati</a>
    </p>
  </div>
</section>

<footer>
    <p>© 2026 STEPUP SHOES - EDITOR SITO Raimondi Leonardo</p>
  </footer>
